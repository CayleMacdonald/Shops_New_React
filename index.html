<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Analytics Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f4f6fb;
    color: #2d3748;
    min-height: 100vh;
    padding: 30px 0;
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 180px;
    background: linear-gradient(135deg, #667eea20, #764ba220);
    z-index: -1;
}

.dashboard {
    padding: 30px 20px;
    max-width: 1800px;
    margin: 0 auto;
}

.header {
    margin-bottom: 40px;
    color: #1a202c;
}

.header h1 { font-size: 42px; font-weight: 800; }

.filters, .kpi-card, .chart-card, .table-card, .insights-section {
    background: white;
    border-radius: 14px;
    border: 1px solid rgba(0,0,0,0.05);
    box-shadow: 0 6px 18px rgba(0,0,0,0.06);
}

.kpis {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.kpi-card { padding:25px; }

.kpi-value {
    font-size: 34px;
    font-weight: 800;
    margin-top: 10px;
}

.charts-grid {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(500px,1fr));
    gap:20px;
    margin-bottom:20px;
}

.chart-container { height: 350px; }

.export-btn {
    padding: 14px 28px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="dashboard">

<div class="header">
<h1>📊 Client Analytics Dashboard</h1>
</div>

<!-- FILTERS -->
<div class="filters" style="padding:20px; margin-bottom:20px;">
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <select id="clientType">
        <option value="both">Both</option>
        <option value="new">New</option>
        <option value="react">React</option>
    </select>
</div>

<!-- KPIs -->
<div class="kpis">
<div class="kpi-card"><div>New Clients</div><div class="kpi-value" id="newCount"></div></div>
<div class="kpi-card"><div>Reactivated</div><div class="kpi-value" id="reactCount"></div></div>
<div class="kpi-card"><div>Revenue</div><div class="kpi-value" id="totalRevenue"></div></div>
<div class="kpi-card"><div>Reactivation Rate</div><div class="kpi-value" id="reactRate"></div></div>
</div>

<!-- CHARTS -->
<div class="charts-grid">

<div class="chart-card">
<h3>Trends</h3>
<canvas id="lineChart"></canvas>
</div>

<div class="chart-card">
<h3>Client Mix</h3>
<canvas id="barChart"></canvas>
</div>

<div class="chart-card">
<h3>Shop Performance</h3>
<canvas id="shopChart"></canvas>
</div>

</div>

<!-- TABLE -->
<div class="table-card" style="padding:20px;">
<h3>Shop Breakdown</h3>
<table width="100%">
<thead>
<tr><th>Shop</th><th>New</th><th>React</th><th>Revenue</th></tr>
</thead>
<tbody id="shopTable"></tbody>
</table>
</div>

<!-- SALES REPS -->
<div class="table-card" style="margin-top:20px; padding:20px;">
<h3>Sales Reps</h3>
<table width="100%">
<thead>
<tr><th>Rep</th><th>New</th><th>React</th><th>Total</th></tr>
</thead>
<tbody id="repTable"></tbody>
</table>
</div>

<button class="export-btn" onclick="exportExcel()">Export</button>

</div>

<script>
// DATA
const rawData = [
{Status:"New", "Sales Day":"2026/06/02","Sales Group":"Cape Town","Turnover in ZAR":500},
{Status:"React","Sales Day":"2026/06/03","Sales Group":"Durban","Turnover in ZAR":300},
{Status:"New","Sales Day":"2026/06/04","Sales Group":"Cape Town","Turnover in ZAR":700},
{Status:"React","Sales Day":"2026/06/05","Sales Group":"Boksburg","Turnover in ZAR":200}
];

let lineChart, barChart, shopChart;

// FILTER
function filter(){
return rawData;
}

// KPIs FIXED
function updateKPIs(data){
let n = data.filter(x=>x.Status==="New").length;
let r = data.filter(x=>x.Status==="React").length;
let rev = data.reduce((a,b)=>a+(Number(b["Turnover in ZAR"])||0),0);
let rate = (n+r)?((r/(n+r))*100).toFixed(1):0;

document.getElementById("newCount").innerText=n;
document.getElementById("reactCount").innerText=r;
document.getElementById("totalRevenue").innerText="R "+rev.toLocaleString();
document.getElementById("reactRate").innerText=rate+"%";

return {n,r,rev};
}

// CHART FIXED (bar instead of donut)
function drawBar(n,r){
if(barChart) barChart.destroy();
barChart = new Chart(document.getElementById("barChart"),{
type:"bar",
data:{
labels:["New","React"],
datasets:[{
data:[n,r],
backgroundColor:["#1e40af","#b45309"]
}]
}
});
}

// LINE
function drawLine(data){
if(lineChart) lineChart.destroy();
lineChart = new Chart(document.getElementById("lineChart"),{
type:"line",
data:{
labels:data.map((_,i)=>i+1),
datasets:[{
label:"Clients",
data:data.map((_,i)=>i),
borderColor:"#667eea"
}]
}
});
}

// SHOP
function drawShop(data){
let shops={};
data.forEach(d=>{
if(!shops[d["Sales Group"]]) shops[d["Sales Group"]]={n:0,r:0,rev:0};
shops[d["Sales Group"]][d.Status==="New"?"n":"r"]++;
shops[d["Sales Group"]].rev+=Number(d["Turnover in ZAR"])||0;
});

let arr=Object.entries(shops);

if(shopChart) shopChart.destroy();
shopChart=new Chart(document.getElementById("shopChart"),{
type:"bar",
data:{
labels:arr.map(x=>x[0]),
datasets:[
{label:"New",data:arr.map(x=>x[1].n),backgroundColor:"#1e40af"},
{label:"React",data:arr.map(x=>x[1].r),backgroundColor:"#b45309"}
]
}
});
}

// REPS
function reps(data){
let names=["Alex","Sam","Jordan"];
let obj={};

data.forEach((d,i)=>{
let rep=names[i%names.length];
if(!obj[rep]) obj[rep]={n:0,r:0};
obj[rep][d.Status==="New"?"n":"r"]++;
});

let tbody=document.getElementById("repTable");
tbody.innerHTML="";
Object.entries(obj).forEach(([k,v])=>{
tbody.innerHTML+=`<tr><td>${k}</td><td>${v.n}</td><td>${v.r}</td><td>${v.n+v.r}</td></tr>`;
});
}

// SHOP TABLE
function table(data){
let shops={};
data.forEach(d=>{
if(!shops[d["Sales Group"]]) shops[d["Sales Group"]]={n:0,r:0,rev:0};
shops[d["Sales Group"]][d.Status==="New"?"n":"r"]++;
shops[d["Sales Group"]].rev+=Number(d["Turnover in ZAR"])||0;
});

let tbody=document.getElementById("shopTable");
tbody.innerHTML="";
Object.entries(shops).forEach(([k,v])=>{
tbody.innerHTML+=`<tr><td>${k}</td><td>${v.n}</td><td>${v.r}</td><td>R ${v.rev}</td></tr>`;
});
}

// UPDATE ALL
function update(){
let d=filter();
let k=updateKPIs(d);
drawBar(k.n,k.r);
drawLine(d);
drawShop(d);
table(d);
reps(d);
}

update();
</script>

</body>
</html>
